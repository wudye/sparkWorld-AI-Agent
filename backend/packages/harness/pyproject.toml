[project]
name = "spark"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "agent-client-protocol>=0.9.0",
    "agent-sandbox>=0.0.30",
    "ddgs>=9.14.1",
    "dotenv>=0.9.9",
    "duckdb>=1.5.2",
    "exa-py>=2.12.1",
    "firecrawl-py>=4.23.0",
    "httpx>=0.28.1",
    "kubernetes>=35.0.0",
    "langchain>=1.2.15",
    "langchain-anthropic>=1.4.1",
    "langchain-deepseek>=1.0.1",
    "langchain-google-genai>=4.2.2",
    "langchain-mcp-adapters>=0.2.2",
    "langchain-openai>=1.2.1",
    "langfuse>=4.5.1",
    "markdownify>=1.2.2",
    "markitdown>=0.1.5",
    "pydantic>=2.13.3",
    "pyyaml>=6.0.3",
    "readabilipy>=0.3.0",
    "tavily-python>=0.7.24",
    "tiktoken>=0.12.0",
]

[project.optional-dependencies]
ollama = [
    "langchain-ollama>=1.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spark"]
