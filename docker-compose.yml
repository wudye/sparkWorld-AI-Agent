services:
  spark-redis:
    image: redis:latest
    container_name: spark-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - spark-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-postgres:
    image: postgres:latest
    container_name: spark-postgres
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: spark_db
    ports:
      - "5432:5432"
    networks:
      - spark-network
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U spark" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    networks:
      - spark-network
    restart: always
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set myminio http://minio:9000 admin password123;
      mc mb myminio/spark-bucket --ignore-existing;
      echo 'Bucket created successfully';
      "
    networks:
      - spark-network




volumes:
    redis-data:
    postgres-data:
    minio_data:

networks:
    spark-network:
      name: spark-network
      driver: bridge